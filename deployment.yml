apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bms

  template:
    metadata:
      labels:
        app: bms

    spec:
      containers:
      - name: bms-container
        image: sumanraj07/bms:latest
        ports:
        - containerPort: 80
